name: publish

on:
  # Tag -> publish (e.g., v0.5.286)
  push:
    tags: [ 'v*' ]

  # Manual trigger so you can test without tagging
  workflow_dispatch:
    inputs:
      skip_natives:
        description: 'Skip Rust/.NET native builds (sets -Dskip.build.natives=true)'
        type: boolean
        default: false

jobs:
  publish:
    runs-on: macos-latest

    permissions:
      contents: read
      packages: write   # required to push to GitHub Packages

    env:
      # Maven flags (batch + skip tests)
      MAVEN_CLI_OPTS: "-B -DskipTests"
      # From workflow_dispatch; empty during tag builds
      SKIP_NATIVES: ${{ inputs.skip_natives }}

      # Optional secrets for generating NuGet.config if you don't keep one in the repo
      NUGET_FEED_URL: ${{ secrets.NUGET_FEED_URL }}
      NUGET_USERNAME: ${{ secrets.NUGET_USERNAME }}
      NUGET_PASSWORD: ${{ secrets.NUGET_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17 (Temurin) + Maven deploy credentials
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          # This wires <server id="github"> for <distributionManagement>
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: ${{ secrets.GITHUB_TOKEN }}

      # ---------- .NET SDK for Thermo server ----------
      - name: Set up .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # If you DON'T have NuGet.config committed, generate one from secrets.
      # Safe no-op if secrets are blank or file already exists.
      - name: Generate NuGet.config from secrets (optional)
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f NuGet.config ]]; then
            echo "NuGet.config already present; skipping generation."
            exit 0
          fi
          if [[ -n "${NUGET_FEED_URL}" && -n "${NUGET_USERNAME}" && -n "${NUGET_PASSWORD}" ]]; then
            cat > NuGet.config <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <add key="thermo" value="${NUGET_FEED_URL}" />
            </packageSources>
            <packageSourceCredentials>
              <thermo>
                <add key="Username" value="${NUGET_USERNAME}" />
                <add key="ClearTextPassword" value="${NUGET_PASSWORD}" />
              </thermo>
            </packageSourceCredentials>
          </configuration>
          EOF
            echo "Generated NuGet.config from secrets."
          else
            echo "NuGet secrets not provided; assuming NuGet.config in repo or public feeds."
          fi

      # ---------- Rust toolchain & cross-compilers ----------
      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust cross targets
        run: |
          rustup target add x86_64-unknown-linux-gnu
          rustup target add x86_64-pc-windows-gnu

      - name: Cache Cargo registry and build dirs
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust-jni/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cross tools (mingw-w64, zig, llvm) and cargo-zigbuild
        shell: bash
        run: |
          set -euo pipefail
          brew update
          # Needed for x86_64-w64-mingw32-dlltool when targeting windows-gnu
          brew install mingw-w64
          # Zig is the cross-linker used by cargo-zigbuild
          brew install zig
          # Optional but handy: llvm provides llvm-dlltool as a fallback
          brew install llvm
          # Install cargo-zigbuild
          cargo install --locked cargo-zigbuild

          # Ensure Homebrew bin paths are available on both Apple Silicon and Intel runners
          echo "/opt/homebrew/opt/mingw-w64/bin" >> "$GITHUB_PATH"
          echo "/usr/local/opt/mingw-w64/bin" >> "$GITHUB_PATH"
          echo "/opt/homebrew/opt/llvm/bin" >> "$GITHUB_PATH"
          echo "/usr/local/opt/llvm/bin" >> "$GITHUB_PATH"

          # Sanity checks
          which x86_64-w64-mingw32-dlltool || { echo "dlltool not found on PATH"; exit 1; }
          x86_64-w64-mingw32-dlltool --version || true
          zig version

      # ---------- Build & Deploy ----------
      # Your POM triggers:
      #   scripts/build-all-net.sh   (dotnet publish for osx-x64, linux-x64, win-x64)
      #   scripts/build-all-rust.sh  (mac arm64 + linux/Windows via cargo-zigbuild)
      - name: Build & deploy to GitHub Packages
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${SKIP_NATIVES:-false}" == "true" ]]; then
            echo ">> Running Maven with -Dskip.build.natives=true"
            mvn ${MAVEN_CLI_OPTS} -Dskip.build.natives=true clean deploy
          else
            echo ">> Running Maven with native builds enabled"
            mvn ${MAVEN_CLI_OPTS} clean deploy
          fi

      # Debug/inspection helper: capture the produced jars even on failure
      - name: Upload built jars (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: msrawjava-artifacts
          path: |
            target/*.jar
            target/lib/*.jar
