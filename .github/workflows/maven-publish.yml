name: publish

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Optional release note version display'
        required: false
        default: ''

permissions:
  contents: write   # needed to create/update Releases
  packages: write   # needed to publish to GitHub Packages

jobs:
  # 1) Build Rust JNI on macOS
  rust-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: dtolnay/rust-toolchain@stable
      - name: Build JNI (macOS aarch64)
        run: |
          set -euo pipefail
          cargo build --manifest-path rust-jni/Cargo.toml --release
          mkdir -p dist/META-INF/lib/osx-aarch64
          cp rust-jni/target/release/libtimsrust_jni.dylib dist/META-INF/lib/osx-aarch64/
      - uses: actions/upload-artifact@v4
        with:
          name: jni-macos
          path: dist

  # 2) Build Rust JNI on Linux
  rust-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Toolchain deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev
      - uses: dtolnay/rust-toolchain@stable
      - name: Build JNI (Linux x86_64)
        run: |
          set -euo pipefail
          cargo build --manifest-path rust-jni/Cargo.toml --release
          mkdir -p dist/META-INF/lib/linux-x86_64
          cp rust-jni/target/release/libtimsrust_jni.so dist/META-INF/lib/linux-x86_64/
      - uses: actions/upload-artifact@v4
        with:
          name: jni-linux
          path: dist

  # 3) Build Rust JNI on Windows (MSVC)
  rust-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: dtolnay/rust-toolchain@stable
      - name: Build JNI (Windows x64, MSVC)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          cargo build --manifest-path rust-jni/Cargo.toml --release
          New-Item -ItemType Directory -Force -Path dist\META-INF\lib\windows-x86_64 | Out-Null
          Copy-Item rust-jni\target\release\timsrust_jni.dll dist\META-INF\lib\windows-x86_64\
      - uses: actions/upload-artifact@v4
        with:
          name: jni-windows
          path: dist

  # 4) Build .NET Thermo servers (macOS)
  dotnet-macos:
    runs-on: macos-latest
    env:
      NUGET_FEED_URL: ${{ secrets.NUGET_FEED_URL }}
      NUGET_USERNAME: ${{ secrets.NUGET_USERNAME }}
      NUGET_PASSWORD: ${{ secrets.NUGET_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Ensure NuGet.config (optional)
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f NuGet.config ]]; then
            echo "NuGet.config present; skipping creation."
          elif [[ -n "${NUGET_FEED_URL}" && -n "${NUGET_USERNAME}" && -n "${NUGET_PASSWORD}" ]]; then
            printf '%s\n' \
              '<?xml version="1.0" encoding="utf-8"?>' \
              '<configuration>' \
              '  <packageSources>' \
              "    <add key=\"thermo\" value=\"${NUGET_FEED_URL}\" />" \
              '  </packageSources>' \
              '  <packageSourceCredentials>' \
              '    <thermo>' \
              "      <add key=\"Username\" value=\"${NUGET_USERNAME}\" />" \
              "      <add key=\"ClearTextPassword\" value=\"${NUGET_PASSWORD}\" />" \
              '    </thermo>' \
              '  </packageSourceCredentials>' \
              '</configuration>' \
              > NuGet.config
            echo "NuGet.config created from secrets."
          else
            echo "No NuGet secrets; assuming public feed or committed NuGet.config."
          fi

      - name: Build .NET servers (your script)
        run: bash scripts/build-all-net.sh

      - uses: actions/upload-artifact@v4
        with:
          name: thermo-servers
          path: src/main/resources/msraw/thermo/bin

  # 5) Assemble, deploy to GitHub Packages, and attach JARs to Release
  publish:
    runs-on: macos-latest
    needs: [rust-macos, rust-linux, rust-windows, dotnet-macos]
    env:
      GH_PACKAGES_USER:  ${{ secrets.GH_PACKAGES_USER }}
      GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage JNI libs into resources
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p core/src/main/resources/META-INF/lib
          rsync -a artifacts/jni-macos/   core/src/main/resources/
          rsync -a artifacts/jni-linux/   core/src/main/resources/
          rsync -a artifacts/jni-windows/ core/src/main/resources/
          echo "JNI staged (core):"
          find core/src/main/resources/META-INF/lib -type f -maxdepth 3 -print

      - name: Stage Thermo servers into resources
        shell: bash
        run: |
          set -euo pipefail
          rm -rf core/src/main/resources/msraw/thermo/bin
          mkdir -p core/src/main/resources/msraw/thermo
          rsync -a artifacts/thermo-servers/ core/src/main/resources/msraw/thermo/bin/
          echo "Thermo servers staged (core):"
          find core/src/main/resources/msraw/thermo/bin -type f -maxdepth 3 -print

      - name: Set up Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Configure Maven server creds for GitHub Packages (PAT)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.m2
          printf '%s\n' \
            '<settings xmlns="http://maven.apache.org/SETTINGS/1.0.0" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd">' \
            '  <servers>' \
            '    <server>' \
            '      <id>github</id>' \
            "      <username>${GH_PACKAGES_USER}</username>" \
            "      <password>${GH_PACKAGES_TOKEN}</password>" \
            '    </server>' \
            '  </servers>' \
            '</settings>' \
            > ~/.m2/settings.xml

      - name: Maven clean deploy (skip native scripts; we already staged)
        run: mvn -B -DskipTests -Dskip.build.natives=true clean deploy

      # Resolve the exact main and javadoc jar names from Maven
      - name: Resolve artifact names
        id: names
        shell: bash
        run: |
          set -euo pipefail
          
          # core module
          CORE_NAME="$(mvn -q -pl core -am -Dexec.executable=echo -Dexec.args='${project.build.finalName}' --non-recursive org.codehaus.mojo:exec-maven-plugin:3.5.1:exec)"
          echo "CORE_MAIN_JAR=core/target/${CORE_NAME}.jar" >> "$GITHUB_ENV"
          if [[ -f "core/target/${CORE_NAME}-javadoc.jar" ]]; then
             echo "CORE_JAVADOC_JAR=core/target/${CORE_NAME}-javadoc.jar" >> "$GITHUB_ENV"
          fi
          echo "Core jar: core/target/${CORE_NAME}.jar"

          # gui module
          GUI_NAME="$(mvn -q -pl gui -am -Dexec.executable=echo -Dexec.args='${project.build.finalName}' --non-recursive org.codehaus.mojo:exec-maven-plugin:3.5.1:exec)"
          echo "GUI_MAIN_JAR=gui/target/${GUI_NAME}.jar" >> "$GITHUB_ENV"
          if [[ -f "gui/target/${GUI_NAME}-javadoc.jar" ]]; then
            echo "GUI_JAVADOC_JAR=gui/target/${GUI_NAME}-javadoc.jar" >> "$GITHUB_ENV"
          fi
          echo "GUI jar: gui/target/${GUI_NAME}.jar"

      # Generate SHA-256 checksums for the jars we’ll upload
      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p target
          : > target/SHA256SUMS.txt
          for f in "${CORE_MAIN_JAR}" "${CORE_JAVADOC_JAR:-}" "${GUI_MAIN_JAR}" "${GUI_JAVADOC_JAR:-}"; do
            if [[ -n "$f" && -f "$f" ]]; then
              shasum -a 256 "$f" >> target/SHA256SUMS.txt
            fi
          done

          echo "Checksum file:"
          cat target/SHA256SUMS.txt || true

      # Attach main + javadoc jars and checksums to the GitHub Release (on tag builds)
      - name: Attach jars to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.CORE_MAIN_JAR }}
            ${{ env.CORE_JAVADOC_JAR }}
            ${{ env.GUI_MAIN_JAR }}
            ${{ env.GUI_JAVADOC_JAR }}
            target/SHA256SUMS.txt
          make_latest: true
          generate_release_notes: true
          fail_on_unmatched_files: false

      # Optional: keep the “debug” artifact of everything under target/ if you like
      - name: Upload built jars (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: msrawjava-artifacts
          path: |
            core/target/*.jar
            gui/target/*.jar
            core/target/lib/*.jar
            gui/target/lib/*.jar
            target/SHA256SUMS.txt
