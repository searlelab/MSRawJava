name: publish

on:
  push:
    tags: [ 'v*' ]   # e.g. v0.5.286
  workflow_dispatch:
    inputs:
      skip_natives:
        description: 'Skip Rust/.NET native builds (sets -Dskip.build.natives=true)'
        type: boolean
        default: false

jobs:
  publish:
    runs-on: macos-latest

    permissions:
      contents: read
      packages: write

    env:
      MAVEN_CLI_OPTS: "-B -DskipTests"
      SKIP_NATIVES: ${{ inputs.skip_natives }}
      # Optional NuGet secrets (only used if you didn't commit NuGet.config)
      NUGET_FEED_URL: ${{ secrets.NUGET_FEED_URL }}
      NUGET_USERNAME: ${{ secrets.NUGET_USERNAME }}
      NUGET_PASSWORD: ${{ secrets.NUGET_PASSWORD }}

      # Predeclare paths we’ll force into PATH later
      BREW_MINGW_BIN_AARCH64: /opt/homebrew/opt/mingw-w64/bin
      BREW_MINGW_BIN_INTEL:   /usr/local/opt/mingw-w64/bin
      BREW_LLVM_BIN_AARCH64:  /opt/homebrew/opt/llvm/bin
      BREW_LLVM_BIN_INTEL:    /usr/local/opt/llvm/bin
      LOCAL_BIN:              $HOME/.local/bin

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Set up Java 17 (Temurin) + Maven deploy credentials
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Generate NuGet.config from secrets (optional)
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f NuGet.config ]]; then
            echo "NuGet.config present; skipping."
            exit 0
          fi
          if [[ -n "${NUGET_FEED_URL}" && -n "${NUGET_USERNAME}" && -n "${NUGET_PASSWORD}" ]]; then
            cat > NuGet.config <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <add key="thermo" value="${NUGET_FEED_URL}" />
            </packageSources>
            <packageSourceCredentials>
              <thermo>
                <add key="Username" value="${NUGET_USERNAME}" />
                <add key="ClearTextPassword" value="${NUGET_PASSWORD}" />
              </thermo>
            </packageSourceCredentials>
          </configuration>
          EOF
            echo "Generated NuGet.config."
          else
            echo "No NuGet secrets; assuming NuGet.config exists or feeds are public."
          fi

      # ---------- Rust toolchain & cross-compilers ----------
      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust cross targets
        run: |
          rustup target add x86_64-unknown-linux-gnu
          rustup target add x86_64-pc-windows-gnu

      - name: Cache Cargo registry and build dirs
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust-jni/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cross tools (mingw-w64, zig, llvm) and cargo-zigbuild
        shell: bash
        run: |
          set -euo pipefail
          brew update
          brew install mingw-w64
          brew install zig
          brew install llvm
          cargo install --locked cargo-zigbuild

          # Ensure bin dirs available across Apple Silicon / Intel runners
          echo "$BREW_MINGW_BIN_AARCH64" >> "$GITHUB_PATH"
          echo "$BREW_MINGW_BIN_INTEL"   >> "$GITHUB_PATH"
          echo "$BREW_LLVM_BIN_AARCH64"  >> "$GITHUB_PATH"
          echo "$BREW_LLVM_BIN_INTEL"    >> "$GITHUB_PATH"
          echo "$LOCAL_BIN"              >> "$GITHUB_PATH"

      - name: Create dlltool shim if needed
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$LOCAL_BIN"

          # If the exact-prefixed dlltool is missing but llvm-dlltool exists,
          # create a shim named x86_64-w64-mingw32-dlltool that forwards to llvm-dlltool.
          if ! command -v x86_64-w64-mingw32-dlltool >/dev/null 2>&1; then
            if command -v llvm-dlltool >/dev/null 2>&1; then
              cat > "$LOCAL_BIN/x86_64-w64-mingw32-dlltool" <<'EOSH'
          #!/usr/bin/env bash
          exec llvm-dlltool "$@"
          EOSH
              chmod +x "$LOCAL_BIN/x86_64-w64-mingw32-dlltool"
              echo "Created shim for x86_64-w64-mingw32-dlltool -> llvm-dlltool"
            else
              echo "llvm-dlltool not found; will rely on mingw-w64 providing dlltool."
            fi
          fi

          echo "PATH at this point:"
          echo "$PATH"
          which x86_64-w64-mingw32-dlltool && x86_64-w64-mingw32-dlltool --version || true
          which llvm-dlltool && llvm-dlltool --version || true
          zig version

      # ---------- Build & deploy ----------
      - name: Build & deploy to GitHub Packages
        shell: bash
        env:
          # Belt-and-suspenders: force PATH for the Maven step, in case subprocess env differs
          PATH: ${{ env.LOCAL_BIN }}:${{ env.BREW_MINGW_BIN_AARCH64 }}:${{ env.BREW_MINGW_BIN_INTEL }}:${{ env.BREW_LLVM_BIN_AARCH64 }}:${{ env.BREW_LLVM_BIN_INTEL }}:${{ env.PATH }}
          # Help cc/rustc find cross tools explicitly
          AR_x86_64_pc_windows_gnu: x86_64-w64-mingw32-ar
          CC_x86_64_pc_windows_gnu: x86_64-w64-mingw32-gcc
          DLLTOOL_x86_64_pc_windows_gnu: x86_64-w64-mingw32-dlltool
        run: |
          set -euo pipefail
          echo "Tool sanity before build:"
          which x86_64-w64-mingw32-dlltool || { echo "dlltool still not on PATH"; exit 1; }
          which x86_64-w64-mingw32-gcc || true
          which x86_64-w64-mingw32-ar || true

          if [[ "${SKIP_NATIVES:-false}" == "true" ]]; then
            echo ">> Running Maven with -Dskip.build.natives=true"
            mvn ${MAVEN_CLI_OPTS} -Dskip.build.natives=true clean deploy
          else
            echo ">> Running Maven with native builds enabled"
            mvn ${MAVEN_CLI_OPTS} clean deploy
          fi

      - name: Upload built jars (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: msrawjava-artifacts
          path: |
            target/*.jar
            target/lib/*.jar
