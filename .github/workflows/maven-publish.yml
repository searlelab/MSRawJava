name: publish

on:
  push:
    tags: [ 'v*' ]   # e.g., v0.5.286
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Optional: override POM version shown in release notes'
        required: false
        default: ''

permissions:
  contents: read
  packages: write

jobs:
  rust-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: dtolnay/rust-toolchain@stable
      - name: Build JNI (macOS aarch64)
        run: |
          set -euo pipefail
          cargo build --manifest-path rust-jni/Cargo.toml --release
          mkdir -p dist/META-INF/lib/osx-aarch64
          cp rust-jni/target/release/libtimsrust_jni.dylib dist/META-INF/lib/osx-aarch64/
      - uses: actions/upload-artifact@v4
        with:
          name: jni-macos
          path: dist

  rust-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Toolchain deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev
      - uses: dtolnay/rust-toolchain@stable
      - name: Build JNI (Linux x86_64)
        run: |
          set -euo pipefail
          cargo build --manifest-path rust-jni/Cargo.toml --release
          mkdir -p dist/META-INF/lib/linux-x86_64
          cp rust-jni/target/release/libtimsrust_jni.so dist/META-INF/lib/linux-x86_64/
      - uses: actions/upload-artifact@v4
        with:
          name: jni-linux
          path: dist

  rust-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: dtolnay/rust-toolchain@stable
      - name: Build JNI (Windows x64, MSVC)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          cargo build --manifest-path rust-jni/Cargo.toml --release
          New-Item -ItemType Directory -Force -Path dist\META-INF\lib\windows-x86_64 | Out-Null
          Copy-Item rust-jni\target\release\timsrust_jni.dll dist\META-INF\lib\windows-x86_64\
      - uses: actions/upload-artifact@v4
        with:
          name: jni-windows
          path: dist

  dotnet-macos:
    runs-on: macos-latest
    env:
      NUGET_FEED_URL: ${{ secrets.NUGET_FEED_URL }}
      NUGET_USERNAME: ${{ secrets.NUGET_USERNAME }}
      NUGET_PASSWORD: ${{ secrets.NUGET_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Generate NuGet.config from secrets (optional)
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f NuGet.config ]]; then
            echo "NuGet.config present; skipping."
          elif [[ -n "${NUGET_FEED_URL}" && -n "${NUGET_USERNAME}" && -n "${NUGET_PASSWORD}" ]]; then
cat > NuGet.config <<EOF
<?xml version="1.0" encoding="utf-8"?>
<configuration>
  <packageSources>
    <add key="thermo" value="${NUGET_FEED_URL}" />
  </packageSources>
  <packageSourceCredentials>
    <thermo>
      <add key="Username" value="${NUGET_USERNAME}" />
      <add key="ClearTextPassword" value="${NUGET_PASSWORD}" />
    </thermo>
  </packageSourceCredentials>
</configuration>
EOF
          else
            echo "No NuGet secrets; assuming NuGet.config is committed or feeds are public."
          fi
      - name: Build .NET servers
        run: bash scripts/build-all-net.sh
      - uses: actions/upload-artifact@v4
        with:
          name: thermo-servers
          path: src/main/resources/msraw/thermo/bin

  publish:
    runs-on: macos-latest
    needs: [rust-macos, rust-linux, rust-windows, dotnet-macos]
    env:
      GH_PACKAGES_USER:   ${{ secrets.GH_PACKAGES_USER }}
      GH_PACKAGES_TOKEN:  ${{ secrets.GH_PACKAGES_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage JNI libs into resources
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p src/main/resources/META-INF/lib
          rsync -a artifacts/jni-macos/   src/main/resources/
          rsync -a artifacts/jni-linux/   src/main/resources/
          rsync -a artifacts/jni-windows/ src/main/resources/
          find src/main/resources/META-INF/lib -type f -maxdepth 3 -print

      - name: Stage Thermo servers into resources
        shell: bash
        run: |
          set -euo pipefail
          rm -rf src/main/resources/msraw/thermo/bin
          mkdir -p src/main/resources/msraw/thermo
          rsync -a artifacts/thermo-servers/ src/main/resources/msraw/thermo/bin/
          find src/main/resources/msraw/thermo/bin -type f -maxdepth 3 -print

      - name: Set up Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Write Maven settings.xml (uses PAT)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
<settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
          xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
          xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0
                              https://maven.apache.org/xsd/settings-1.0.0.xsd">
  <servers>
    <server>
      <id>github</id>
      <username>${GH_PACKAGES_USER}</username>
      <password>${GH_PACKAGES_TOKEN}</password>
    </server>
  </servers>
</settings>
EOF

      - name: Sanity print Maven version
        run: mvn -v

      # We already staged natives; skip your native build scripts
      - name: Maven clean deploy (skip native scripts)
        run: mvn -B -DskipTests -Dskip.build.natives=true clean deploy

      - name: Upload built jars (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: msrawjava-artifacts
          path: |
            target/*.jar
            target/lib/*.jar
