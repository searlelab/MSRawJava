syntax = "proto3";
package msraw.thermo;

// .NET namespace stays as-is
option csharp_namespace = "MSRaw.Thermo.Proto";

// Tell protoc how to generate Java
option java_package = "org.searlelab.msrawjava.io.thermo.rpc";
option java_outer_classname = "ThermoRawProto";
option java_multiple_files = true;

service ThermoRawService {
  rpc Open(OpenRequest) returns (OpenReply);
  rpc Close(CloseRequest) returns (CloseReply);
  rpc GetPrecursors(PrecursorsRequest) returns (stream Spectrum);
  rpc GetStripes(StripesRequest) returns (stream Spectrum);
  rpc GetRunSummary(Session) returns (RunSummary);
  rpc GetRanges(Session) returns (RangesReply);
  rpc GetMetadata(Session) returns (MetadataReply);
  rpc GetMs1Tic(TicRequest) returns (TicReply);
}

message OpenRequest { string path = 1; }
message OpenReply   { string session_id = 1; string instrument_model = 2; double start_time = 3; double end_time = 4; }
message CloseRequest { string session_id = 1; }
message CloseReply { bool ok = 1; }
message Session { string session_id = 1; }

// methods for getting metadata
message RunSummary {
  double gradient_length_seconds = 1;
  double total_ion_current       = 2;
}

message MetadataReply {
  map<string, string> kv = 1;
}

message WindowRange {
  double lo = 1;
  double hi = 2;
  double average_duty_cycle_seconds = 3;
  int32  number_of_msms = 4;
}

message RangesReply {
  repeated WindowRange windows = 1;
}

message TicRequest {
  string session_id = 1;   // from OpenReply.session_id
  double rt_min     = 2;   // minutes (inclusive)
  double rt_max     = 3;   // minutes (inclusive)
}

message TicReply {
  repeated double rt_seconds = 1;  // parallel to tic[]
  repeated double tic        = 2;  // TIC per MS1 scan
}

// methods for getting spectra
message PrecursorsRequest { 
  string session_id = 1; 
  double rt_min = 2; 
  double rt_max = 3; 
  bool profile = 4; 
}

message StripesRequest {
  string session_id = 1; 
  double rt_min = 2; 
  double rt_max = 3;
  double mz_lo = 4; 
  double mz_hi = 5; 
  bool profile = 6; 
}

message Spectrum {
  repeated double mz = 1;
  repeated float  intensity = 2;
  repeated float  ims = 3;

  int32  scan_number = 10;
  double rt_seconds  = 11;
  int32  ms_level    = 12;
  double iso_lower   = 13;
  double iso_upper   = 14;
  int32  charge      = 15;
  string spectrum_name  = 16;
  string precursor_name = 17;
  double ion_injection_time_s = 18;
  double scan_window_lower = 19;
  double scan_window_upper = 20;
}
